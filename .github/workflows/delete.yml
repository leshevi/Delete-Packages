name: Delete Old Packages
on:
  workflow_dispatch: # Позволяет запускать процесс вручную кнопкой

jobs:
  clean-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Delete deployment packages
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'amneziawg-dockerhub/amneziawg-scratch'
          package-type: 'container' # Замените на container, maven, nuget, rubygems
          owner: 'leshevi'
          min-versions-to-keep: 5
          token: ${{ secrets.CR_PAT }}
